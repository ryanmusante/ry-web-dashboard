<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0c10">
<title>ry-web-dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #0a0c10;
  --bg-1: #11141a;
  --bg-2: #181c24;
  --bg-3: #1f242e;
  --bg-hover: #262c38;
  --border: #252b38;
  --border-dim: #1b2030;
  --text: #b8bfc9;
  --text-dim: #5c6370;
  --text-bright: #dce0e8;
  --accent: #5b8def;
  --accent-bg: rgba(91,141,239,0.08);
  --accent-border: rgba(91,141,239,0.2);
  --ok: #3ddc84;
  --ok-bg: rgba(61,220,132,0.08);
  --ok-border: rgba(61,220,132,0.2);
  --warn: #f0b429;
  --warn-bg: rgba(240,180,41,0.08);
  --warn-border: rgba(240,180,41,0.2);
  --err: #e5534b;
  --err-bg: rgba(229,83,75,0.08);
  --err-border: rgba(229,83,75,0.2);
  --cyan: #39c5cf;
  --orange: #e8833a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --r: 5px;
}

[data-theme="light"] {
  --bg-0: #f0f1f4;
  --bg-1: #ffffff;
  --bg-2: #f5f6f8;
  --bg-3: #e8eaed;
  --bg-hover: #e0e2e6;
  --border: #d0d4da;
  --border-dim: #e0e2e6;
  --text: #3c4252;
  --text-dim: #7c8494;
  --text-bright: #1a1e2a;
  --accent: #2e6ce6;
  --accent-bg: rgba(46,108,230,0.07);
  --accent-border: rgba(46,108,230,0.18);
  --ok: #1a9f52;
  --ok-bg: rgba(26,159,82,0.07);
  --ok-border: rgba(26,159,82,0.18);
  --warn: #c88a0a;
  --warn-bg: rgba(200,138,10,0.07);
  --warn-border: rgba(200,138,10,0.18);
  --err: #c93830;
  --err-bg: rgba(201,56,48,0.07);
  --err-border: rgba(201,56,48,0.18);
  --cyan: #1a8e96;
  --orange: #c06520;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; background: var(--bg-0); color: var(--text);
  font: 400 13.5px/1.5 var(--sans);
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 44px;
  background: var(--bg-1); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand { font: 600 14px var(--mono); color: var(--text-bright); letter-spacing: -0.03em; }
.brand em { font-style: normal; color: var(--accent); }
.hdr-meta { font: 400 11px var(--mono); color: var(--text-dim); display: flex; gap: 14px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: 1px; }
.dot-ok { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
.dot-err { background: var(--err); box-shadow: 0 0 5px var(--err); }

nav {
  display: flex; background: var(--bg-1); border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
nav button {
  font: 400 11px var(--mono); color: var(--text-dim); background: none;
  border: none; padding: 9px 15px; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; text-transform: uppercase;
  letter-spacing: 0.06em; transition: color 0.15s, border-color 0.15s;
}
nav button:hover { color: var(--text); }
nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

main { flex: 1; overflow-y: auto; padding: 16px 20px; scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent; }

.g { display: grid; gap: 10px; }
.g2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.g3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.g4 { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }

.c { background: var(--bg-1); border: 1px solid var(--border-dim); border-radius: var(--r); padding: 14px 16px; }
.c-label { font: 500 10px var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

.val { font: 300 26px var(--mono); color: var(--text-bright); line-height: 1.1; }
.val-sm { font-size: 18px; }
.unit { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 1px; }
.sub { font: 400 11px var(--mono); color: var(--text-dim); margin-top: 5px; }

.bar-track { height: 3px; background: var(--bg-0); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

.spark { display: flex; align-items: flex-end; gap: 1px; height: 36px; margin-top: 8px; }
.spark i { flex: 1; min-width: 2px; max-width: 7px; border-radius: 1px 1px 0 0; transition: height 0.3s; }

.badge { display: inline-flex; align-items: center; gap: 4px; font: 500 11px var(--mono); padding: 2px 7px; border-radius: 3px; }
.badge-ok { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-border); }
.badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
.badge-err { background: var(--err-bg); color: var(--err); border: 1px solid var(--err-border); }
.badge-info { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }

.row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font: 400 12px var(--mono); border-bottom: 1px solid var(--border-dim); }
.row:last-child { border-bottom: none; }

.term { background: var(--bg-0); border: 1px solid var(--border-dim); border-radius: var(--r); padding: 14px 16px; font: 400 11.5px/1.65 var(--mono); white-space: pre-wrap; word-break: break-all; max-height: 68vh; overflow-y: auto; color: var(--text); scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent; }
.term .c-ok { color: var(--ok); }
.term .c-err { color: var(--err); }
.term .c-warn { color: var(--warn); }
.term .c-info { color: var(--accent); }
.term .c-dim { color: var(--text-dim); }

.btn { font: 500 11px var(--mono); padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--r); background: var(--bg-2); color: var(--text); cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em; white-space: nowrap; }
.btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--text-dim); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-p { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-p:hover:not(:disabled) { background: #4a7de0; border-color: #4a7de0; }
.btn-d { border-color: var(--err); color: var(--err); }
.btn-d:hover:not(:disabled) { background: var(--err-bg); }
.btn-sm { padding: 4px 8px; font-size: 10px; }
.btn-icon { padding: 5px 8px; font-size: 14px; line-height: 1; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-dim); border-radius: var(--r); cursor: pointer; transition: all 0.12s; }
.btn-icon:hover { background: var(--bg-hover); color: var(--text); }
.btns { display: flex; gap: 6px; flex-wrap: wrap; }

select { font: 400 11px var(--mono); padding: 6px 10px; background: var(--bg-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--r); cursor: pointer; }

.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar h2 { font: 600 13px var(--mono); color: var(--text-bright); margin-right: auto; }

.sec { margin-bottom: 16px; }
.sec-label { font: 500 10px var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border-dim); }

.flist { list-style: none; font: 400 11.5px var(--mono); }
.flist li { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid var(--border-dim); transition: background 0.1s; }
.flist li:hover { background: var(--bg-hover); }
.flist li:last-child { border-bottom: none; }

.spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp 0.6s linear infinite; vertical-align: -1px; margin-right: 6px; }
@keyframes sp { to { transform: rotate(360deg); } }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.dialog { background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; max-width: 400px; width: 92%; }
.dialog h3 { font: 600 13px var(--mono); color: var(--text-bright); margin-bottom: 10px; }
.dialog p { font-size: 12.5px; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; }
.dialog .btns { justify-content: flex-end; }

#toasts { position: fixed; bottom: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column-reverse; gap: 6px; }
.toast { font: 400 11.5px var(--mono); padding: 8px 14px; border-radius: var(--r); background: var(--bg-2); border: 1px solid var(--border); color: var(--text); animation: ti 0.2s ease; max-width: 340px; }
.toast-ok { border-color: var(--ok-border); color: var(--ok); }
.toast-err { border-color: var(--err-border); color: var(--err); }
@keyframes ti { from { opacity: 0; transform: translateY(8px); } }

.empty { font: 400 12px var(--mono); color: var(--text-dim); text-align: center; padding: 48px 20px; background: var(--bg-1); border: 1px solid var(--border-dim); border-radius: var(--r); }

.hidden { display: none !important; }

@media (max-width: 600px) {
  main { padding: 10px; }
  .val { font-size: 20px; }
  .c { padding: 10px 12px; }
  header { padding: 0 12px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">ry-<em>dashboard</em></div>
    <div class="hdr-meta">
      <button id="theme-toggle" class="btn-icon" title="Toggle theme">&#9790;</button>
      <span id="conn"><span class="dot dot-err"></span>connecting</span>
      <span id="hdr-kernel"></span>
    </div>
  </header>
  <nav id="tabs"></nav>
  <main id="main"></main>
</div>
<div id="toasts"></div>
<div id="overlay" class="overlay hidden"></div>
<script src="/static/app.js"></script>
</body>
</html>
